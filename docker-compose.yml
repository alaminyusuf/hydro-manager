services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    volumes: 
      - ./server:/app          
      - /app/node_modules
    ports:
      - "4000:4000"
    develop:
      watch:
        - action: sync
          path: ./server
          target: /app
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongodb:27017/hydro-manager
    depends_on:
      - mongodb

  mongodb:
    image: mongo:8.2.5
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
